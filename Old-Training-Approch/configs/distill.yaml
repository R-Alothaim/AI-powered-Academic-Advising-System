# ── Knowledge Distillation Configuration ──

teacher:
  model_name: "${TEACHER_MODEL_NAME}"       # <-- your teacher model name here
  torch_dtype: "bfloat16"
  device_map: "auto"
  max_length: 2048

student:
  model_name: "${STUDENT_MODEL_NAME}"       # <-- your student model name here
  torch_dtype: "bfloat16"
  device_map: "auto"
  max_length: 2048

distillation:
  temperature: 4.0
  alpha_ce: 0.5                             # weight for hard-label cross-entropy
  alpha_kd: 0.5                             # weight for KL-divergence (soft labels)
  label_smoothing: 0.1

training:
  epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  seed: 42
  logging_steps: 10
  eval_steps: 250
  save_steps: 500
  save_total_limit: 3
  output_dir: "outputs/distill"
  report_to: "wandb"

data:
  train_uri: "${DATASET_TRAIN_URI}"
  eval_uri: "${DATASET_EVAL_URI}"
  cache_dir: "${DATA_CACHE_DIR}"
  val_split: 0.1
  seed: 42
  preprocessing:
    fix_grammar: true
    normalize_prerequisites: true
    fix_credit_hours: true
    normalize_answer_punctuation: true
    deduplicate: true
